<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Accounting AI Learning App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui;
}

.keyword{
color:#4f46e5;
font-weight:600;
}

.card{
background:white;
border-radius:12px;
padding:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.mnemonic{
background:#FEF3C7;
border-left:6px solid #F59E0B;
padding:12px;
border-radius:8px;
margin-top:10px;
}

.taccount{
display:flex;
border:2px solid #ddd;
border-radius:8px;
overflow:hidden;
margin-top:10px;
}

.tcol{
flex:1;
padding:10px;
}

</style>

</head>

<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen flex flex-col">

<!-- HEADER -->

<div class="bg-white shadow p-4 flex justify-between">

<h1 class="font-bold text-lg">
📘 Accounting AI Learning
</h1>

<button onclick="downloadNotes()" class="bg-indigo-600 text-white px-3 py-1 rounded">
Export Notes
</button>

</div>


<!-- MAIN GRID -->

<div class="grid md:grid-cols-4 flex-1 gap-4 p-4">


<!-- SIDEBAR -->

<div class="space-y-4">

<div class="card">

<h2 class="font-semibold mb-2">
Tools
</h2>

<button onclick="showSection('chat')" class="block mb-2">AI Tutor</button>
<button onclick="showSection('flashcards')" class="block mb-2">Flashcards</button>
<button onclick="showSection('quiz')" class="block mb-2">Quiz</button>
<button onclick="showSection('taccount')" class="block mb-2">T Account</button>
<button onclick="showSection('calculator')" class="block">Calculator</button>

</div>

</div>


<!-- MAIN AREA -->

<div class="md:col-span-3 space-y-4">

<!-- CHAT -->

<div id="chatSection" class="card">

<h2 class="font-semibold mb-4">AI Accounting Tutor</h2>

<div id="chat" class="space-y-4 max-h-[400px] overflow-y-auto"></div>

<div class="flex mt-4">

<input id="input" class="flex-1 border rounded px-3 py-2" placeholder="Ask accounting question">

<button onclick="sendMessage()" class="ml-2 bg-indigo-600 text-white px-4 py-2 rounded">
Send
</button>

</div>

</div>


<!-- FLASHCARDS -->

<div id="flashcardsSection" class="card hidden">

<h2 class="font-semibold mb-4">Flashcards</h2>

<div id="flashcard" class="text-center text-xl p-10 bg-indigo-50 rounded"></div>

<button onclick="nextFlashcard()" class="mt-4 bg-indigo-600 text-white px-3 py-2 rounded">
Next
</button>

</div>


<!-- QUIZ -->

<div id="quizSection" class="card hidden">

<h2 class="font-semibold mb-4">Quiz</h2>

<div id="quizQuestion"></div>

<div id="quizOptions" class="space-y-2 mt-4"></div>

</div>


<!-- T ACCOUNT -->

<div id="taccountSection" class="card hidden">

<h2 class="font-semibold mb-4">T Account Visualizer</h2>

<div class="taccount">

<div class="tcol">

<h3 class="font-semibold">Debit</h3>
<ul id="debitList"></ul>

</div>

<div class="tcol border-l">

<h3 class="font-semibold">Credit</h3>
<ul id="creditList"></ul>

</div>

</div>

<div class="flex mt-4 gap-2">

<input id="ttext" class="border px-2 py-1" placeholder="Account">

<select id="ttype" class="border px-2 py-1">
<option>Debit</option>
<option>Credit</option>
</select>

<button onclick="addT()" class="bg-indigo-600 text-white px-3 py-1 rounded">
Add
</button>

</div>

</div>


<!-- CALCULATOR -->

<div id="calculatorSection" class="card hidden">

<h2 class="font-semibold mb-4">Accounting Calculator</h2>

<input id="rev" placeholder="Revenue" class="border px-2 py-1 mb-2 block">
<input id="cost" placeholder="Cost" class="border px-2 py-1 mb-2 block">

<button onclick="calcProfit()" class="bg-indigo-600 text-white px-3 py-2 rounded">
Calculate Profit
</button>

<div id="profitResult" class="mt-4 text-lg"></div>

</div>

</div>

</div>


<script>

let apiKey = ""
let model = "deepseek/deepseek-r1:free"

let messages=[{
role:"system",
content:`
You are an expert accounting tutor.

Structure answers using:

### Concept
Explain clearly.

### Example
Show journal entry.

### Explanation
Step by step.

### Mnemonic
Memory trick.

Highlight accounting keywords like Debit, Credit.
`
}]


function highlight(text){

let words=["Debit","Credit","Assets","Liabilities","Capital","Revenue","Expense"]

words.forEach(w=>{
let r=new RegExp("\\b"+w+"\\b","g")
text=text.replace(r,"<span class='keyword'>"+w+"</span>")
})

return text

}


function render(role,content){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className=role==="user"?"text-right":"text-left"

div.innerHTML=`
<div class="inline-block card">
${marked.parse(highlight(content))}
</div>
`

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}


async function sendMessage(){

let input=document.getElementById("input")
let text=input.value

if(!text)return

render("user",text)

messages.push({role:"user",content:text})

input.value=""

render("assistant","Thinking...")

let response=await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
messages:messages
})
})

let data=await response.json()

let reply=data.choices?.[0]?.message?.content||"Error"

messages.push({role:"assistant",content:reply})

render("assistant",reply)

}



function showSection(name){

["chat","flashcards","quiz","taccount","calculator"].forEach(s=>{
document.getElementById(s+"Section").classList.add("hidden")
})

document.getElementById(name+"Section").classList.remove("hidden")

}



let flashcards=[
{q:"What is Debit?",a:"Left side of account"},
{q:"What is Credit?",a:"Right side of account"},
{q:"Accounting equation?",a:"Assets = Liabilities + Capital"}
]

let fc=0

function nextFlashcard(){

let f=flashcards[fc]

document.getElementById("flashcard").innerText=f.q+" → "+f.a

fc=(fc+1)%flashcards.length

}



let quiz={
q:"Assets = ?",
options:[
"Liabilities + Capital",
"Revenue - Cost",
"Profit + Expenses"
],
answer:0
}

document.getElementById("quizQuestion").innerText=quiz.q

quiz.options.forEach((o,i)=>{

let btn=document.createElement("button")

btn.className="block border px-3 py-2 rounded"

btn.innerText=o

btn.onclick=()=>{

if(i===quiz.answer)alert("Correct")
else alert("Wrong")

}

document.getElementById("quizOptions").appendChild(btn)

})


function addT(){

let text=document.getElementById("ttext").value
let type=document.getElementById("ttype").value

let li=document.createElement("li")

li.innerText=text

if(type==="Debit")
document.getElementById("debitList").appendChild(li)
else
document.getElementById("creditList").appendChild(li)

}



function calcProfit(){

let rev=parseFloat(document.getElementById("rev").value||0)
let cost=parseFloat(document.getElementById("cost").value||0)

let profit=rev-cost

document.getElementById("profitResult").innerText="Profit = "+profit

}



function downloadNotes(){

let text=messages.map(m=>m.role+": "+m.content).join("\n\n")

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="accounting_notes.txt"

a.click()

}

</script>

</body>
</html>
